name: Publish nested assets

on:
  workflow_dispatch:
  push:
    tags:
      - nested-assets-v*

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.2

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: pnpm

      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @gitborlando/vite-plugin-nested-assets build

      - run: npm publish
        working-directory: packages/nested-assets
