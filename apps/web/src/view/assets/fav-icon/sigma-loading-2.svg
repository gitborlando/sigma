<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 400 469"
     width="400"
     height="469"
     role="img"
     aria-labelledby="title desc"
     style="background: transparent; overflow: visible;">
  <title id="title">Animated sigma logo</title>
  <desc id="desc">Black logo on a transparent background with a subtle looping scale animation and a breathing effect created by opacity changes.</desc>
  <style>
    .logo {
      fill: #000000;
      opacity: 0.6;
      transform-box: fill-box;
      transform-origin: center;
      animation: logo-breathe 3s ease-in-out infinite;
      will-change: transform, opacity;
    }

    @keyframes logo-breathe {
      0%, 100% {
        opacity: 0.52;
        transform: scale(0.965);
      }
      50% {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>

