  <style>
    .logo-group { opacity: 1; animation: groupFade 3.2s ease-in-out infinite; }
    .logo-path {
      fill: #000; fill-opacity: 0; stroke: #000; stroke-opacity: 1; stroke-width: 3;
      stroke-linejoin: miter; stroke-linecap: square; vector-effect: non-scaling-stroke;
      stroke-dasharray: 1; stroke-dashoffset: 1;
      animation:
        draw 3.2s cubic-bezier(.33,0,.2,1) infinite,
        fillIntegrate 3.2s cubic-bezier(.33,0,.2,1) infinite,
        softenStroke 3.2s cubic-bezier(.33,0,.2,1) infinite;
    }
    @keyframes draw { 0% {stroke-dashoffset:1;} 58% {stroke-dashoffset:0;} 100% {stroke-dashoffset:0;} }
    @keyframes fillIntegrate { 0%, 52% {fill-opacity:0;} 76% {fill-opacity:1;} 88% {fill-opacity:1;} 100% {fill-opacity:1;} }
    @keyframes softenStroke { 0%, 52% {stroke-opacity:1; stroke-width:3;} 76% {stroke-opacity:.45; stroke-width:2.1;} 88% {stroke-opacity:.4; stroke-width:2;} 100% {stroke-opacity:.4; stroke-width:2;} }
    @keyframes groupFade { 0%, 88% {opacity:1;} 100% {opacity:0;} }
  </style>
